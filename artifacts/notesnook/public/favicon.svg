<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9d70ff"/>
      <stop offset="100%" stop-color="#5218e8"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#c4a8ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5218e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>

  <!-- Lightning bolt — Lucide Zap shape, scaled to 180×180 with 28px padding -->
  <!-- Original Lucide polygon (24×24): 13,2 3,14 12,14 11,22 21,10 12,10 -->
  <!-- Scale = 5.167 · offset = (28, 26) -->
  <polygon
    points="95,36 43,98 88,98 82,144 137,80 90,80"
    fill="#ddd0ff"
    filter="url(#glow)"
  />
</svg>
